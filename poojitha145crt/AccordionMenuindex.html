<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-Screen Accordion Menu</title>
    <link rel="stylesheet" href="AMstyle.css">
</head>
<body>
    <div class="accordion">
        <div class="accordion-item">
            <h2 class="accordion-header">
                <span class="arrow">+</span> 
                Appetizers
            </h2>
            <div class="accordion-content">
                <p>Garlic Bread</p>
                <p>Bruschetta</p>
                <p>Mozzarella Sticks</p>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header">
                <span class="arrow">+</span> 
                Main Courses
            </h2>
            <div class="accordion-content">
                <p>Margherita Pizza</p>
                <p>Spaghetti Carbonara</p>
                <p>Grilled Salmon</p>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header">
                <span class="arrow">+</span> 
                Desserts
            </h2>
            <div class="accordion-content">
                <p>Tiramisu</p>
                <p>Chocolate Lava Cake</p>
                <p>Cheesecake</p>
            </div>
        </div>
    </div>

    <script src="AMscript.js"></script>
</body>
</html>
